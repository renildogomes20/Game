<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpó</title>
    <link rel="stylesheet" href="estilo/jokenpo.css">
</head>
<body>
    <section>
        <h1>JO KEN PÓ</h1>
        <div>
            <p>O computador jogou</p>
            <p>Sua vez!</p>
            <p><label for="player">Insira um número de 1 á 3 <input type="number" name="player" id="player"> <input type="button" value="Jogar" onclick="jogar()"></label></p>
            <div id="res"></div>
            <p>
                Quer continuar? [S/N]
                <label for="confS">
                    Sim <input type="radio" name="conf" id="confS">
                </label>
                <label for="confN">
                    Não <input type="radio" name="conf" id="confN">
                </label>
            </p>
        </div>
    </section>
    

<script src="script.js"></script>
    
</body>
</html>
